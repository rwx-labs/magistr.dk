<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goddag: Quotes - og tegneserier!!!!</title>

  <style>
    :root {
      --link-color: {{ utils::random_hex_color() }};
      --link-weight: {{ utils::random_font_style() }};
      --link-visited-color: {{ utils::random_hex_color() }};
      --link-visited-weight: {{ utils::random_font_style() }};
      --link-hover-color: {{ utils::random_hex_color() }};
      --link-hover-weight: {{ utils::random_font_style() }};
      --link-active-color: {{ utils::random_hex_color() }};
      --link-active-weight: {{ utils::random_font_style() }};
      --header-text-color: {{ utils::random_hex_color() }};
      --header-bg-color: {{ utils::random_hex_color() }};
      --channel-text-color: {{ utils::random_hex_color() }};
      --statement-text-color: {{ utils::random_hex_color() }};
      --statement-bg-color: {{ utils::random_hex_color() }};
      --statement-margin-left: {{ utils::random_number(10, 500) }}px;
      --statement-font-style: {{ utils::random_font_style() }};
      --statement-font-size: {{ utils::random_number(14, 40) }}px;
      --body-bg-color: {{ utils::random_hex_color() }};
    }
  </style>
  <link rel="stylesheet" href="static/style.css" />
</head>

<body>
  <header>
    <h1 class="header">#magistr quotes!</h1>
    <p class="channel">- #magistr @ dk.quakenet.org</p>
    <p class="statement">{{ utils::random_statement() }}</p>
  </header>

  <div id="linkD">
    <h2>
      <a href="/ny.php">--&gt; Brækker du dig af grin? Så har du set noget på #magistr somburde
        burde quotes. Klik her. NU &lt;--</a>
    </h2>
  </div>

  <main>
{%- block content %}{% endblock -%}
  </main>
</body>
</html>
