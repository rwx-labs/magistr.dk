{% extends "base.html" %}

{% block content %}
{%- for quote in quotes %}
    <article class="quote" id="quote-{{ quote.id }}">
      <header>
        <h2>
          <a href="/?id={{ quote.id }}">{{ quote.date }}</a>:
        </h2>
      </header>

      <pre class="quote-text"><samp>{{ quote.text }}</samp></pre>
    </article>
{% endfor %}
{% endblock content %}
